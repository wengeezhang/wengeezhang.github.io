<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 525" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif" role="img">
<title>LLM 训练显存构成图</title>
<rect x="0" y="0" width="680" height="525" fill="#ffffff"/>

<rect x="40" y="55" width="165" height="70" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
<text x="122" y="88" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">主权重 (fp32)</text>
<text x="122" y="108" text-anchor="middle" font-size="12" fill="#185FA5">4 字节/参数 · 32GB</text>

<rect x="235" y="40" width="405" height="100" rx="8" fill="none" stroke="#888780" stroke-width="0.8" stroke-dasharray="6 4"/>
<text x="245" y="58" font-size="12" fill="#5F5E5A">Adam 优化器状态</text>

<rect x="255" y="70" width="175" height="60" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
<text x="342" y="98" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">动量 momentum</text>
<text x="342" y="117" text-anchor="middle" font-size="12" fill="#185FA5">4 字节/参数 · 32GB</text>

<rect x="450" y="70" width="170" height="60" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
<text x="535" y="98" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">方差 variance</text>
<text x="535" y="117" text-anchor="middle" font-size="12" fill="#185FA5">4 字节/参数 · 32GB</text>

<line x1="30" y1="165" x2="650" y2="165" stroke="#378ADD" stroke-width="2"/>
<text x="648" y="158" text-anchor="end" font-size="12" fill="#185FA5">32 位 fp32</text>
<text x="648" y="184" text-anchor="end" font-size="12" fill="#185FA5">16 位 fp16</text>

<path d="M122,125 C122,200 250,225 322,248" fill="none" stroke="#1D9E75" stroke-width="3"/>
<path d="M322,248 l-9,-3 l3,9 z" fill="#1D9E75"/>
<text x="40" y="232" font-size="12" fill="#1D9E75">复制为 fp16 在 GPU 计算</text>

<rect x="40" y="255" width="150" height="70" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
<text x="115" y="285" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">输入 + 激活值</text>
<text x="115" y="305" text-anchor="middle" font-size="12" fill="#5F5E5A">??GB · 随批量变化</text>

<rect x="255" y="250" width="170" height="80" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
<text x="340" y="285" text-anchor="middle" font-size="14" font-weight="500" fill="#633806">工作权重 (fp16)</text>
<text x="340" y="306" text-anchor="middle" font-size="12" fill="#854F0B">2 字节/参数 · 16GB</text>

<rect x="255" y="420" width="170" height="70" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<text x="340" y="450" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">梯度 (fp16)</text>
<text x="340" y="470" text-anchor="middle" font-size="12" fill="#0F6E56">2 字节/参数 · 16GB</text>

<rect x="40" y="415" width="175" height="85" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.8"/>
<text x="127" y="443" text-anchor="middle" font-size="14" font-weight="500" fill="#791F1F">显存合计</text>
<text x="127" y="465" text-anchor="middle" font-size="12" fill="#A32D2D">16+16+32+32+32</text>
<text x="127" y="489" text-anchor="middle" font-size="14" font-weight="500" fill="#791F1F">= 128 GB</text>

<path d="M190,290 L250,290" fill="none" stroke="#888780" stroke-width="1.5"/>
<path d="M250,290 l-9,-3 l0,6 z" fill="#888780"/>
<path d="M375,330 C470,360 470,395 378,418" fill="none" stroke="#888780" stroke-width="1.5"/>
<path d="M378,418 l8,-5 l-6,-3 z" fill="#888780"/>
<text x="482" y="382" font-size="12" fill="#5F5E5A">前向 + 反向传播</text>
<path d="M425,452 C610,452 610,230 548,140" fill="none" stroke="#888780" stroke-width="1.5"/>
<path d="M548,140 l2,9 l6,-5 z" fill="#888780"/>
<text x="600" y="300" font-size="12" fill="#5F5E5A">更新</text>
</svg>
